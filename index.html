<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>포켓몬 로그라이크</title>
<link href="https://fonts.googleapis.com/css2?family=Galmuri11&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;
  --accent:#ffcb05;--accent2:#3b5bdb;--text:#e8e8f0;--muted:#6b6b8a;
  --red:#ff4757;--green:#2ed573;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Galmuri11',monospace;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.screen.hidden{display:none!important;}
.hidden{display:none!important;}

/* ── TITLE ── */
#titleScreen{background:radial-gradient(ellipse at 50% 30%,#1a1a3a 0%,#0a0a0f 70%);}
.title-bg-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) var(--delay,0s) infinite;}
@keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:1;}}
.title-logo{text-align:center;margin-bottom:2rem;position:relative;z-index:1;}
.title-logo h1{font-size:clamp(1.8rem,5vw,3rem);color:var(--accent);text-shadow:0 0 30px rgba(255,203,5,.5);letter-spacing:.1em;line-height:1.2;}
.title-logo p{color:var(--muted);font-size:.75rem;margin-top:.5rem;letter-spacing:.15em;}
.pokeball-deco{width:80px;height:80px;border-radius:50%;background:linear-gradient(180deg,#e74c3c 50%,#fff 50%);border:4px solid #333;position:relative;margin:0 auto 1.5rem;animation:spin 8s linear infinite;}
.pokeball-deco::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:#fff;border:4px solid #333;}
@keyframes spin{to{transform:rotate(360deg);}}
.title-btns{display:flex;flex-direction:column;gap:.75rem;align-items:center;position:relative;z-index:1;}
.btn-start{background:var(--accent);color:#000;border:none;padding:.9rem 2.5rem;font-family:'Galmuri11',monospace;font-size:1rem;border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(255,203,5,.3);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,203,5,.5);}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);padding:.7rem 2rem;font-family:'Galmuri11',monospace;font-size:.85rem;border-radius:12px;cursor:pointer;}
.title-user{color:var(--muted);font-size:.7rem;}

/* ── LOGIN ── */
#loginScreen{background:var(--bg);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem 1.8rem;width:100%;max-width:360px;}
.login-box h2{color:var(--accent);font-size:1rem;margin-bottom:1.2rem;text-align:center;}
.login-tab{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.2rem;}
.login-tab button{flex:1;background:none;border:none;color:var(--muted);font-family:'Galmuri11',monospace;font-size:.8rem;padding:.5rem;cursor:pointer;border-bottom:2px solid transparent;}
.login-tab button.active{color:var(--accent);border-bottom-color:var(--accent);}
.login-field{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem;}
.login-field input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.55rem .85rem;color:var(--text);font-family:'Galmuri11',monospace;font-size:.8rem;outline:none;}
.login-field input:focus{border-color:var(--accent);}
.login-err{color:var(--red);font-size:.68rem;min-height:1rem;text-align:center;}
.btn-login{width:100%;background:var(--accent);color:#000;border:none;padding:.75rem;font-family:'Galmuri11',monospace;font-size:.85rem;border-radius:10px;cursor:pointer;}

/* ── SELECT ── */
#selectScreen{background:var(--bg);padding:1rem;overflow:hidden;}
.select-header{text-align:center;margin-bottom:.75rem;width:100%;}
.select-header h2{color:var(--accent);font-size:1.1rem;}
.select-header p{color:var(--muted);font-size:.7rem;margin-top:.2rem;}
.search-bar{width:100%;max-width:500px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.5rem .85rem;color:var(--text);font-family:'Galmuri11',monospace;font-size:.8rem;outline:none;margin-bottom:.6rem;}
.search-bar:focus{border-color:var(--accent);}
.pokemon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:.45rem;width:100%;max-width:600px;max-height:calc(100dvh - 210px);overflow-y:auto;padding:.2rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.pkcard{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:.35rem;cursor:pointer;transition:all .15s;text-align:center;position:relative;}
.pkcard:hover{border-color:var(--accent);transform:translateY(-2px);}
.pkcard.selected{border-color:var(--accent);background:rgba(255,203,5,.1);}
.pkcard.met{border-color:var(--accent2);}
.pkcard img{width:54px;height:54px;image-rendering:pixelated;}
.pkcard .pk-name{font-size:.52rem;color:var(--text);margin-top:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pkcard .pk-num{font-size:.48rem;color:var(--muted);}
.met-badge{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--accent2);}
.select-footer{width:100%;max-width:600px;margin-top:.6rem;display:flex;flex-direction:column;align-items:center;gap:.45rem;}
.selected-info{display:flex;align-items:center;gap:.7rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.45rem .85rem;width:100%;}
.selected-info img{width:46px;height:46px;image-rendering:pixelated;}
.info-text h3{font-size:.78rem;color:var(--text);}
.info-text p{font-size:.63rem;color:var(--muted);}
.type-badge{display:inline-block;padding:.1rem .4rem;border-radius:20px;font-size:.53rem;margin-right:.2rem;}
.warning-met{background:rgba(59,91,219,.15);border:1px solid rgba(59,91,219,.4);border-radius:8px;padding:.35rem .65rem;font-size:.63rem;color:#7c9dff;width:100%;text-align:center;}
.btn-confirm{background:var(--accent);color:#000;border:none;padding:.65rem 2rem;font-family:'Galmuri11',monospace;font-size:.82rem;border-radius:10px;cursor:pointer;width:100%;}
.btn-confirm:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}

/* ── GAME (canvas) ── */
#gameScreen{background:#000;padding:0;}
#gameCanvas{display:block;width:100%;height:100dvh;touch-action:none;}

/* ── LEVELUP ── */
#levelupScreen{background:rgba(0,0,0,.88);}
.levelup-box{background:var(--card);border:2px solid var(--accent);border-radius:20px;padding:1.8rem;text-align:center;max-width:320px;width:90%;}
.levelup-box h2{color:var(--accent);font-size:1.2rem;margin-bottom:.8rem;}
.stat-changes{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.8rem 0;}
.stat-row{background:var(--surface);border-radius:8px;padding:.35rem .55rem;font-size:.68rem;}
.stat-row .label{color:var(--muted);}
.stat-row .val{color:var(--green);}

/* ── CLEAR ── */
#clearScreen{background:radial-gradient(ellipse at 50% 50%,#1a2a1a 0%,#0a0a0f 70%);}
.clear-content{text-align:center;}
.clear-content h1{font-size:2rem;color:var(--accent);text-shadow:0 0 20px rgba(255,203,5,.5);}
.reward-pokemon img{width:100px;height:100px;image-rendering:pixelated;filter:drop-shadow(0 0 20px rgba(255,203,5,.6));animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ── GAMEOVER ── */
#gameoverScreen{background:radial-gradient(ellipse at 50% 50%,#2a0a0a 0%,#0a0a0f 70%);}
.gameover-content h1{font-size:2.5rem;color:var(--red);}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:20;padding:.45rem .6rem;}
.hud-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:.4rem;}
.hud-panel{background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.35rem .55rem;backdrop-filter:blur(4px);}
.hud-name{font-size:.62rem;color:var(--accent);margin-bottom:.2rem;}
.hud-hp-bar{width:120px;height:7px;background:#333;border-radius:4px;overflow:hidden;}
.hud-hp-fill{height:100%;background:var(--green);border-radius:4px;transition:width .25s;}
.hud-hp-text{font-size:.58rem;color:var(--text);margin-top:.12rem;}
.hud-stage-num{font-size:.62rem;color:var(--accent);text-align:center;}
.hud-stage-lv{font-size:.57rem;color:var(--muted);text-align:center;}
.hud-boss-name{font-size:.62rem;color:var(--red);margin-bottom:.2rem;}
.hud-boss-hp-bar{width:120px;height:7px;background:#333;border-radius:4px;overflow:hidden;}
.hud-boss-hp-fill{height:100%;background:var(--red);border-radius:4px;transition:width .25s;}
#hudBoss{border-color:rgba(255,71,87,.4);display:none;}
#hudBoss.visible{display:block;}

/* ── MOBILE CONTROLS ── */
#controls{
  position:fixed;bottom:0;left:0;right:0;height:160px;
  pointer-events:none;z-index:20;
  display:none;
}
/* 조이스틱 */
#joystickZone{
  position:absolute;bottom:18px;left:18px;
  width:110px;height:110px;
  pointer-events:all;
}
#joystickBase{
  position:absolute;inset:0;
  border-radius:50%;
  background:rgba(20,20,40,.55);
  border:2px solid rgba(255,255,255,.18);
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
#joystickKnob{
  position:absolute;
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(255,255,255,.28);
  border:2px solid rgba(255,255,255,.5);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  transition:box-shadow .1s;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
/* 오른쪽 버튼 패널 */
.ctrl-right-panel{
  position:absolute;bottom:18px;right:18px;
  display:flex;flex-direction:column;align-items:flex-end;gap:10px;
  pointer-events:all;
}
.ctrl-atk-row{display:flex;gap:10px;align-items:center;}
.ctrl-btn{
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:bold;line-height:1.1;
  text-align:center;
  pointer-events:all;cursor:pointer;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  transition:transform .08s,background .08s;
  box-shadow:0 3px 10px rgba(0,0,0,.5);
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn.jump{
  width:64px;height:64px;font-size:1.3rem;
  background:rgba(40,40,100,.75);
  border:2.5px solid rgba(150,150,255,.55);
  color:rgba(200,200,255,.9);
}
.ctrl-btn.atk1{
  width:60px;height:60px;
  background:rgba(100,30,10,.75);
  border:2.5px solid rgba(255,120,60,.6);
  color:#ff9070;
}
.ctrl-btn.atk2{
  width:60px;height:60px;
  background:rgba(20,30,100,.75);
  border:2.5px solid rgba(100,130,255,.6);
  color:#90a8ff;
}
.ctrl-btn.pressed,.ctrl-btn:active{
  transform:scale(.86);
  background:rgba(255,255,255,.3)!important;
}

/* ── TOAST ── */
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.45rem 1rem;font-size:.68rem;color:var(--text);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── STAGE 공통 버튼 ── */
.stage-btn{background:var(--accent);color:#000;border:none;padding:.65rem 1.8rem;font-family:'Galmuri11',monospace;font-size:.82rem;border-radius:10px;cursor:pointer;}

/* ── HINT ── */
#stageHint{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);color:rgba(255,203,5,.8);font-size:.7rem;z-index:20;pointer-events:none;text-align:center;text-shadow:0 0 8px rgba(0,0,0,.8);}
</style>
</head>
<body>

<!-- TITLE -->
<div class="screen" id="titleScreen">
  <div class="title-bg-stars" id="stars"></div>
  <div class="title-logo">
    <div class="pokeball-deco"></div>
    <h1>포켓몬<br>로그라이크</h1>
    <p>POKEMON ROGUELIKE</p>
  </div>
  <div class="title-btns">
    <div class="title-user" id="titleUser"></div>
    <button class="btn-start" id="btnTitleStart">▶ 시작하기</button>
    <button class="btn-outline" id="btnTitleLogout"  style="display:none">로그아웃</button>
  </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="loginScreen">
  <div class="login-box">
    <h2>🎮 포켓몬 로그라이크</h2>
    <div class="login-tab">
      <button class="active" id="tabLogin" >로그인</button>
      <button id="tabSignup" >회원가입</button>
    </div>
    <div class="login-field">
      <input type="text" id="loginId" placeholder="아이디" autocomplete="off">
      <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="off">
      <input type="password" id="loginPwConfirm" placeholder="비밀번호 확인" class="hidden" autocomplete="off">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="btnLoginAction" >로그인</button>
  </div>
</div>

<!-- SELECT -->
<div class="screen hidden" id="selectScreen">
  <div class="select-header">
    <h2>🎮 포켓몬 선택</h2>
    <p>함께할 포켓몬을 선택하세요</p>
  </div>
  <input class="search-bar" id="pkSearch" placeholder="이름 또는 번호로 검색...">
  <div class="pokemon-grid" id="pokemonGrid"></div>
  <div class="select-footer">
    <div class="selected-info" id="selectedInfo" style="display:none">
      <img id="selImg" src="" alt="">
      <div class="info-text">
        <h3 id="selName">-</h3>
        <p id="selTypes">-</p>
        <p id="selStats" style="font-size:.6rem;color:var(--muted);margin-top:.1rem"></p>
      </div>
    </div>
    <div class="warning-met hidden" id="warnMet">⚠️ 이미 도감에 등록된 포켓몬입니다. 그래도 진행하시겠어요?</div>
    <button class="btn-confirm" id="btnConfirm" disabled >이 포켓몬으로 시작!</button>
  </div>
</div>

<!-- GAME CANVAS (lobby + stages) -->
<div class="screen hidden" id="gameScreen">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- LEVELUP -->
<div class="screen hidden" id="levelupScreen">
  <div class="levelup-box">
    <h2>⬆ 레벨 업!</h2>
    <p id="lvupText" style="font-size:.73rem;color:var(--muted)"></p>
    <div class="stat-changes" id="statChanges"></div>
    <button class="stage-btn" id="btnNextStage" style="width:100%;margin-top:.5rem">다음 스테이지 →</button>
  </div>
</div>

<!-- CLEAR -->
<div class="screen hidden" id="clearScreen">
  <div class="clear-content">
    <h1>🎉 클리어!</h1>
    <p style="color:var(--muted);font-size:.8rem;margin:.4rem 0 1.2rem">모든 스테이지를 클리어했습니다!</p>
    <div class="reward-pokemon" style="display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:1.2rem">
      <img id="clearImg" src="" alt="">
      <h3 id="clearName" style="color:var(--text);font-size:1rem;"></h3>
      <p id="clearMsg" style="font-size:.7rem;color:var(--muted);"></p>
    </div>
    <button class="stage-btn" id="btnClearTitle">타이틀로</button>
  </div>
</div>

<!-- GAMEOVER -->
<div class="screen hidden" id="gameoverScreen">
  <div class="gameover-content" style="text-align:center">
    <h1>💀 게임 오버</h1>
    <p id="gameoverMsg" style="color:var(--muted);font-size:.8rem;margin:1rem 0"></p>
    <button class="stage-btn" id="btnGameoverTitle">타이틀로</button>
  </div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div class="hud-inner">
    <div class="hud-panel">
      <div class="hud-name" id="hudName">-</div>
      <div class="hud-hp-bar"><div class="hud-hp-fill" id="hudHpFill"></div></div>
      <div class="hud-hp-text" id="hudHpText">HP 0/0</div>
    </div>
    <div class="hud-panel">
      <div class="hud-stage-num" id="hudStage">LOBBY</div>
      <div class="hud-stage-lv" id="hudLv">Lv.1</div>
    </div>
    <div class="hud-panel" id="hudBoss">
      <div class="hud-boss-name" id="hudBossName">-</div>
      <div class="hud-boss-hp-bar"><div class="hud-boss-hp-fill" id="hudBossHpFill"></div></div>
    </div>
  </div>
</div>

<!-- MOBILE CONTROLS -->
<div id="controls">
  <!-- 왼쪽: 조이스틱 -->
  <div id="joystickZone">
    <div id="joystickBase"></div>
    <div id="joystickKnob"></div>
  </div>
  <!-- 오른쪽: 점프 + 공격 -->
  <div class="ctrl-right-panel">
    <div class="ctrl-atk-row">
      <div class="ctrl-btn atk2" id="btnAtk2" style="display:none"><span id="atk2Label">X</span></div>
      <div class="ctrl-btn atk1" id="btnAtk1"><span id="atk1Label">Z</span></div>
      <div class="ctrl-btn jump" id="btnJump">▲</div>
    </div>
  </div>
</div>

<!-- HINT -->
<div id="stageHint"></div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyA7U76tBd49620GgDqXqn3U4TM-lHcIiLA",
  authDomain:"pokedaily-217fc.firebaseapp.com",
  projectId:"pokedaily-217fc",
  storageBucket:"pokedaily-217fc.firebasestorage.app",
  appId:"1:520527569400:web:2ec16d4fa87308196a760d"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
let currentUser=null, isLoginMode=true, metPokemonIds=new Set();

onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    await loadMetIds(user.uid);
    updateTitleUser(user.email?.replace('@pkdex.com','')||'트레이너');
  } else {
    currentUser=null; metPokemonIds=new Set(); updateTitleUser(null);
  }
});

async function loadMetIds(uid){
  try{
    const snap=await getDoc(doc(db,'users',uid));
    if(snap.exists()){ const met=snap.data().met||[]; metPokemonIds=new Set(met.map(m=>m.id)); }
  }catch(e){}
}

function updateTitleUser(name){
  document.getElementById('titleUser').textContent=name?name+' 트레이너로 로그인 중':'';
  document.getElementById('btnTitleLogout').style.display=name?'inline-block':'none';
}

function switchTab(mode){
  isLoginMode=mode==='login';
  document.getElementById('tabLogin').classList.toggle('active',isLoginMode);
  document.getElementById('tabSignup').classList.toggle('active',!isLoginMode);
  document.getElementById('loginPwConfirm').classList.toggle('hidden',isLoginMode);
  document.getElementById('btnLoginAction').textContent=isLoginMode?'로그인':'회원가입';
  document.getElementById('loginErr').textContent='';
}

async function doAuth(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  const pw2=document.getElementById('loginPwConfirm').value;
  const err=document.getElementById('loginErr');
  if(!id||!pw){err.textContent='아이디와 비밀번호를 입력하세요.';return;}
  const email=id+'@pkdex.com';
  const btn=document.getElementById('btnLoginAction'); btn.disabled=true; err.textContent='';
  try{
    if(isLoginMode){ await signInWithEmailAndPassword(auth,email,pw); }
    else{
      if(pw!==pw2){err.textContent='비밀번호가 일치하지 않습니다.';btn.disabled=false;return;}
      const cred=await createUserWithEmailAndPassword(auth,email,pw);
      await setDoc(doc(db,'users',cred.user.uid),{nickname:id,username:id.toLowerCase(),met:[],avatar:'🎮',bio:'',friends:[],friendRequests:[],friendsData:{}});
    }
    showScreen('titleScreen');
  }catch(e){

// 1~5: 미진화(0), 6~10: 1차(1), 11~15: 2차(2), 16~20: 3차(3)
function getEvoStage(stage){
  if(stage<=5) return 0;
  if(stage<=10) return 1;
  if(stage<=15) return 2;
  return 3;
}

// 해당 진화 단계 포켓몬 ID 랜덤 선택
function pickEnemyId(gen, evoStage){
  const evoData=GEN_EVO_STAGES[gen];
  if(!evoData) return GEN_RANGES[gen][0]+Math.floor(Math.random()*(GEN_RANGES[gen][1]-GEN_RANGES[gen][0]+1));
  // 해당 단계 목록
  let pool=evoData[evoStage]||[];
  // 목록이 비어있으면 상위/하위 단계 fallback
  if(pool.length===0){
    for(let fb=evoStage-1;fb>=0;fb--){if(evoData[fb]&&evoData[fb].length>0){pool=evoData[fb];break;}}
  }
  if(pool.length===0) pool=evoData[0]||[];
  return pool[Math.floor(Math.random()*pool.length)];
}

let allPokemon=[],filteredPokemon=[],selectedPokemon=null;
let gameGen=1,bosses={mid:null,final:null},currentStage=0,playerLevel=1,playerData=null;

function spriteUrl(id){return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}
function getNameCache(){try{return JSON.parse(localStorage.getItem('pkrl_names')||'{}')}catch(e){return{}}}
function saveNameCache(c){try{localStorage.setItem('pkrl_names',JSON.stringify(c))}catch(e){}}

async function loadPokemonList(){
  const grid=document.getElementById('pokemonGrid');
  grid.innerHTML='<div style="color:var(--muted);font-size:.75rem;grid-column:1/-1;text-align:center;padding:2rem">로딩 중...</div>';
  for(let i=1;i<=1025;i++) allPokemon.push({id:i,name:`#${String(i).padStart(3,'0')}`,types:[],sprite:spriteUrl(i)});
  filteredPokemon=[...allPokemon]; renderGrid(); loadBasicNames();
}

async function loadBasicNames(){
  const cache=getNameCache();
  if(Object.keys(cache).length>900){applyNameCache(cache);return;}
  try{
    const r=await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=1025&offset=0');
    const d=await r.json();
    for(const item of d.results){
      const id=parseInt(item.url.split('/').filter(Boolean).pop());
      if(!cache[id]) cache[id]={name:item.name,ko:null};
    }
    saveNameCache(cache); applyNameCache(cache);
  }catch(e){}
}

function fmtName(n){return n.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function applyNameCache(cache){
  for(const pk of allPokemon){
    if(cache[pk.id]){pk.engName=cache[pk.id].name||pk.name;pk.name=cache[pk.id].ko||fmtName(cache[pk.id].name||`#${pk.id}`);}
  }
  filterPokemon();
}

function renderGrid(){
  const grid=document.getElementById('pokemonGrid'); grid.innerHTML='';
  const shown=filteredPokemon.slice(0,200);
  for(const pk of shown){
    const el=document.createElement('div');
    el.className='pkcard'+(metPokemonIds.has(pk.id)?' met':'');
    el.dataset.id=pk.id;
    el.innerHTML=`${metPokemonIds.has(pk.id)?'<div class="met-badge"></div>':''}
      <img src="${pk.sprite}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 56 56%22><text y=%2240%22 font-size=%2240%22>❓</text></svg>'">
      <div class="pk-name">${pk.name}</div><div class="pk-num">#${String(pk.id).padStart(3,'0')}</div>`;
    el.onclick=()=>selectPk(pk); grid.appendChild(el);
  }
  if(filteredPokemon.length>200){
    const m=document.createElement('div');
    m.style.cssText='grid-column:1/-1;text-align:center;color:var(--muted);font-size:.63rem;padding:.4rem';
    m.textContent=`검색으로 좁혀보세요 (${filteredPokemon.length-200}마리 더 있음)`;
    grid.appendChild(m);
  }
}

function filterPokemon(){
  const q=document.getElementById('pkSearch').value.trim().toLowerCase();
  filteredPokemon=!q?[...allPokemon]:allPokemon.filter(pk=>pk.name.toLowerCase().includes(q)||(pk.engName&&pk.engName.toLowerCase().includes(q))||String(pk.id).includes(q));
  renderGrid();
}

async function selectPk(pk){
  selectedPokemon=pk;
  document.querySelectorAll('.pkcard').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.pkcard[data-id="${pk.id}"]`)?.classList.add('selected');
  if(!pk.types||pk.types.length===0) await fetchPokemonDetail(pk);
  document.getElementById('selectedInfo').style.display='flex';
  document.getElementById('selImg').src=pk.sprite;
  document.getElementById('selName').textContent=pk.name;
  const tb=(pk.types||[]).map(t=>`<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'};color:#000">${TYPE_EMOJIS[t]||''} ${t}</span>`).join('');
  document.getElementById('selTypes').innerHTML=tb||'-';
  const s=pk.stats||{};
  document.getElementById('selStats').textContent=`HP:${s.hp||'?'} 공:${s.atk||'?'} 방:${s.def||'?'} 속:${s.spe||'?'}`;
  document.getElementById('warnMet').classList.toggle('hidden',!metPokemonIds.has(pk.id));
  document.getElementById('btnConfirm').disabled=false;
}

async function fetchPokemonDetail(pk){
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${pk.id}`);
    const d=await r.json();
    pk.types=d.types.map(t=>TYPE_KO[t.type.name]||t.type.name);
    const sv=d.stats;
    pk.stats={hp:sv.find(s=>s.stat.name==='hp')?.base_stat||50,atk:sv.find(s=>s.stat.name==='attack')?.base_stat||50,def:sv.find(s=>s.stat.name==='defense')?.base_stat||50,spa:sv.find(s=>s.stat.name==='special-attack')?.base_stat||50,spd:sv.find(s=>s.stat.name==='special-defense')?.base_stat||50,spe:sv.find(s=>s.stat.name==='speed')?.base_stat||50};
    const sr=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${pk.id}`);
    const sd=await sr.json();
    const ko=sd.names.find(n=>n.language.name==='ko');
    if(ko){pk.name=ko.name;const cache=getNameCache();if(cache[pk.id]){cache[pk.id].ko=ko.name;saveNameCache(cache);}}
  }catch(e){}
}

async function confirmSelect(){
  if(!selectedPokemon) return;
  if(!selectedPokemon.stats) await fetchPokemonDetail(selectedPokemon);
  gameGen=Math.floor(Math.random()*9)+1;
  const sh=[...LEGEND_BY_GEN[gameGen]].sort(()=>Math.random()-.5);
  bosses.mid=sh[0]; bosses.final=sh[1];
  await Promise.all([loadBossStats(bosses.mid),loadBossStats(bosses.final)]);
  currentStage=0; playerLevel=1;
  playerData=buildPlayerData(selectedPokemon,1);
  startLobby();
}

async function loadBossStats(boss){
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${boss.id}`);
    const d=await r.json();
    boss.types=d.types.map(t=>TYPE_KO[t.type.name]||t.type.name);
    boss.sprite=spriteUrl(boss.id);
    const sv=d.stats;
    boss.baseStats={hp:sv.find(s=>s.stat.name==='hp')?.base_stat||100,atk:sv.find(s=>s.stat.name==='attack')?.base_stat||100,def:sv.find(s=>s.stat.name==='defense')?.base_stat||100,spe:sv.find(s=>s.stat.name==='speed')?.base_stat||100};
  }catch(e){boss.types=['드래곤'];boss.sprite=spriteUrl(boss.id);boss.baseStats={hp:100,atk:100,def:100,spe:100};}
}

function calcStat(base,lv){return Math.floor((base*2*lv)/100)+5;}
function calcHP(base,lv){return Math.floor((base*2*lv)/100)+lv+10;}
function buildPlayerData(pk,lv){
  const s=pk.stats;
  return {id:pk.id,name:pk.name,sprite:pk.sprite,types:pk.types||['노말'],level:lv,maxHp:calcHP(s.hp,lv),hp:calcHP(s.hp,lv),atk:calcStat(Math.max(s.atk,s.spa),lv),def:calcStat(s.def,lv),spe:calcStat(s.spe,lv),baseStats:s};
}

// ── 플랫폼 레이아웃 생성 ──────────────────────────────────────
// 스테이지마다 다른 시드로 재현 가능한 랜덤 레이아웃 생성
function seededRand(seed){
  let s=seed;
  return ()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};
}

function genPlatforms(stage){
  const plats=[];
  const W=mapWidth, H=floorY;

  if(stage===0){
    // 로비: 느긋하고 넓은 배치
    const lobby=[
      {x:200,y:H-150,w:130,h:16},{x:440,y:H-230,w:140,h:16},
      {x:680,y:H-170,w:110,h:16},{x:900,y:H-270,w:130,h:16},
      {x:1130,y:H-190,w:150,h:16},{x:1380,y:H-290,w:120,h:16},
      {x:1620,y:H-155,w:140,h:16},{x:1870,y:H-240,w:110,h:16},
    ];
    for(const p of lobby) plats.push(p);
    return plats;
  }

  // 스테이지별 시드 & 패턴 (7가지 패턴 순환)
  const rnd=seededRand(stage*73856+12345);
  const pattern=((stage-1)%7);
  const difficulty=Math.min(stage/20,1); // 0~1

  const ri=(min,max)=>min+Math.floor(rnd()*(max-min+1));
  const rf=(min,max)=>min+rnd()*(max-min);

  if(pattern===0){
    // 계단형 (오른쪽으로 점점 높아짐)
    const cnt=5+ri(0,2);
    const xStep=Math.floor((W-500)/cnt);
    for(let i=0;i<cnt;i++){
      plats.push({x:280+i*xStep+ri(-30,30),y:H-140-i*(40+ri(0,30)),w:ri(100,150),h:16});
    }
    // 중간 보너스 플랫폼
    plats.push({x:ri(500,900),y:H-350-ri(0,50),w:ri(80,120),h:16});
  } else if(pattern===1){
    // 지그재그 (좌우 교차)
    const cnt=6+ri(0,2);
    const xStep=Math.floor((W-400)/cnt);
    for(let i=0;i<cnt;i++){
      const offset=i%2===0?0:ri(60,100);
      plats.push({x:250+i*xStep+offset,y:H-160-i*ri(20,35),w:ri(90,140),h:16});
    }
    plats.push({x:W/2-60+ri(-80,80),y:H-ri(330,400),w:ri(100,130),h:16});
  } else if(pattern===2){
    // 군집형 (3~4개 묶음)
    const clusters=[[250,300],[650,750],[1050,1150],[1450,1550]];
    for(const [cx,cy_unused] of clusters){
      const baseY=H-ri(160,220);
      plats.push({x:cx,y:baseY,w:ri(110,150),h:16});
      plats.push({x:cx+ri(100,170),y:baseY-ri(80,130),w:ri(80,110),h:16});
    }
    plats.push({x:W/2-50,y:H-ri(300,380),w:ri(90,120),h:16});
  } else if(pattern===3){
    // 수직 탑 형태 (중앙에 높이 쌓인 플랫폼)
    const cx=W/2;
    for(let i=0;i<5;i++){
      const xOff=ri(-180,180);
      plats.push({x:cx+xOff,y:H-150-i*ri(70,100),w:ri(100,160),h:16});
    }
    // 좌우 접근용
    plats.push({x:ri(180,300),y:H-ri(140,200),w:ri(110,150),h:16});
    plats.push({x:W-ri(300,420),y:H-ri(140,200),w:ri(110,150),h:16});
  } else if(pattern===4){
    // 파도형 (sin 커브 기반 높이)
    const cnt=7+ri(0,2);
    const xStep=Math.floor((W-350)/cnt);
    for(let i=0;i<cnt;i++){
      const wave=Math.sin(i*0.9)*80;
      plats.push({x:200+i*xStep+ri(-20,20),y:H-200+wave-ri(0,30),w:ri(90,140),h:16});
    }
    plats.push({x:W/2+ri(-100,100),y:H-ri(360,420),w:ri(80,110),h:16});
  } else if(pattern===5){
    // 피라미드형 (가운데 최고점)
    const peak=W/2;
    for(let i=0;i<3;i++){
      const yBase=H-150-i*100;
      const spread=550-i*160;
      plats.push({x:peak-spread/2-ri(0,40),y:yBase+ri(-20,20),w:ri(100,140),h:16});
      plats.push({x:peak+spread/2-ri(60,80)+ri(0,40),y:yBase+ri(-20,20),w:ri(100,140),h:16});
    }
    // 꼭대기
    plats.push({x:peak-ri(50,70),y:H-460-ri(0,40),w:ri(100,140),h:16});
    // 양 끝 진입용
    plats.push({x:ri(180,280),y:H-ri(140,180),w:ri(110,150),h:16});
    plats.push({x:W-ri(300,400),y:H-ri(140,180),w:ri(110,150),h:16});
  } else {
    // 산개형 (완전 랜덤, 이동 가능 보장)
    const cnt=8+ri(0,3);
    let prevX=200, prevY=H-160;
    for(let i=0;i<cnt;i++){
      const w=ri(90,150);
      const dx=ri(200,350);
      const dy=ri(-120,100);
      const nx=prevX+dx;
      const ny=Math.max(H-420,Math.min(H-140,prevY+dy));
      if(nx+w>W-200) break;
      plats.push({x:nx,y:ny,w,h:16});
      prevX=nx; prevY=ny;
    }
  }

  // 어려운 스테이지: 발판 일부 좁히기
  if(difficulty>0.6){
    for(const p of plats){
      if(rnd()<0.3) p.w=Math.max(60,p.w-30);
    }
  }

  return plats;
}

// ── 문(입구/출구) ─────────────────────────────────────────────
function genDoors(stage){
  const H=floorY;
  const entrance={x:40,y:H-130,w:80,h:130,type:'entrance',label:'입구'};
  // 출구: 스테이지 길이에 따라 맵 끝 고정
  const exit={x:mapWidth-130,y:H-130,w:80,h:130,type:'exit',label:'출구',locked:stage>0};
  return [entrance,exit];
}

function initStageMap(stage){
  resizeCanvas();
  mapWidth=Math.max(canvas.width*2.8,2200);
  platforms=genPlatforms(stage);
  doors=genDoors(stage);
  projectiles=[]; particles=[]; camera={x:0,y:0};
  gamePhase=stage===0?'lobby':'fight';

  // 플레이어 배치: 입구 오른쪽
  const ph=playerData.hp, pmh=playerData.maxHp;
  player={
    x:doors[0].x+doors[0].w+20,y:floorY-80,
    w:80,h:80,vx:0,vy:0,onGround:false,facing:1,
    img:Object.assign(new Image(),{src:playerData.sprite}),
    atkCooldown:[0,0],invincible:0,
    hp:ph,maxHp:pmh,
    animTick:0,
  };

  enemies=[];
  stageEnemyCount=0;

  if(stage>0){
    const isBoss=stage===10||stage===20;
    if(isBoss){
      const boss=stage===10?bosses.mid:bosses.final;
      const bHp=calcHP(boss.baseStats.hp*2,playerData.level);
      enemies.push(makeEnemy(boss,mapWidth-320,floorY-120,bHp,true));
      document.getElementById('hudBossName').textContent=boss.name;
      document.getElementById('hudBoss').classList.add('visible');
      updateBossHud(enemies[0]);
    } else {
      document.getElementById('hudBoss').classList.remove('visible');
      const cnt=3+Math.floor(Math.random()*3);
      const evoStage=getEvoStage(stage);
      // 진화 단계 레이블
      const evoLabels=['미진화','1차 진화','2차 진화','3차 진화'];
      for(let i=0;i<cnt;i++){
        const id=pickEnemyId(gameGen, evoStage);
        const ex=400+i*340+Math.random()*100;
        // 진화 단계에 따라 스탯 스케일
        const evoScale=1+evoStage*0.35; // 미진화1.0, 1차1.35, 2차1.7, 3차2.05
        const rp={id,name:`#${id}`,types:[rndType()],sprite:spriteUrl(id),
          baseStats:{hp:(50+Math.random()*40)*evoScale,atk:(40+Math.random()*35)*evoScale,def:30*evoScale,spe:40}};
        enemies.push(makeEnemy(rp,ex,floorY-80,calcHP(rp.baseStats.hp,Math.ceil(playerData.level*.5)),false));
      }
    }
    stageEnemyCount=enemies.length;
  }
}

// ── 컨트롤 셋업 ───────────────────────────────────────────────
// 조이스틱 상태
let _jsActive=false, _jsTouchId=null, _jsOrigin={x:0,y:0}, _jsVec={x:0,y:0};
const JS_RADIUS=45, JS_DEAD=0.18;

function setupControls(){
  // 키보드
  document.onkeydown=e=>{
    if(e.key==='ArrowLeft') keys.left=true;
    if(e.key==='ArrowRight') keys.right=true;
    if((e.key==='ArrowUp'||e.key===' ')&&!e.repeat){keys.jump=true;just.jump=true;}
    if((e.key==='z'||e.key==='Z')&&!e.repeat){just.atk1=true;keys.atk1=true;}
    if((e.key==='x'||e.key==='X')&&!e.repeat){just.atk2=true;keys.atk2=true;}
    if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  };
  document.onkeyup=e=>{
    if(e.key==='ArrowLeft') keys.left=false;
    if(e.key==='ArrowRight') keys.right=false;
    if(e.key==='ArrowUp'||e.key===' ') keys.jump=false;
    if(e.key==='z'||e.key==='Z') keys.atk1=false;
    if(e.key==='x'||e.key==='X') keys.atk2=false;
  };

  // 조이스틱
  const zone=document.getElementById('joystickZone');
  const knob=document.getElementById('joystickKnob');
  function jsStart(e){
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    _jsActive=true; _jsTouchId=e.touches?t.identifier:null;
    const r=zone.getBoundingClientRect();
    _jsOrigin={x:r.left+r.width/2, y:r.top+r.height/2};
    jsMove(e);
  }
  function jsMove(e){
    if(!_jsActive) return; e.preventDefault();
    const t=e.touches?Array.from(e.touches).find(tt=>tt.identifier===_jsTouchId)||e.touches[0]:e;
    const dx=t.clientX-_jsOrigin.x, dy=t.clientY-_jsOrigin.y;
    const dist=Math.min(Math.hypot(dx,dy),JS_RADIUS);
    const angle=Math.atan2(dy,dx);
    const nx=Math.cos(angle)*dist, ny=Math.sin(angle)*dist;
    _jsVec={x:nx/JS_RADIUS, y:ny/JS_RADIUS};
    knob.style.transform=`translate(calc(-50% + ${nx}px),calc(-50% + ${ny}px))`;
    keys.left=_jsVec.x<-JS_DEAD;
    keys.right=_jsVec.x>JS_DEAD;
  }
  function jsEnd(e){
    e.preventDefault();
    _jsActive=false; _jsVec={x:0,y:0};
    keys.left=false; keys.right=false;
    knob.style.transform='translate(-50%,-50%)';
  }
  zone.addEventListener('touchstart',jsStart,{passive:false});
  zone.addEventListener('touchmove',jsMove,{passive:false});
  zone.addEventListener('touchend',jsEnd,{passive:false});
  zone.addEventListener('touchcancel',jsEnd,{passive:false});
  zone.addEventListener('mousedown',jsStart);
  window.addEventListener('mousemove',e=>{if(_jsActive)jsMove(e);});
  window.addEventListener('mouseup',e=>{if(_jsActive)jsEnd(e);});

  // 점프/공격 버튼
  setupMobileBtn('btnJump','jump');
  setupMobileBtn('btnAtk1','atk1');
  setupMobileBtn('btnAtk2','atk2');

  // 타입 레이블
  const t1=playerData.types[0]||'노말';
  const t2=playerData.types[1];
  document.getElementById('atk1Label').textContent=(TYPE_EMOJIS[t1]||t1)+' Z';
  if(t2){
    document.getElementById('btnAtk2').style.display='flex';
    document.getElementById('atk2Label').textContent=(TYPE_EMOJIS[t2]||t2)+' X';
  } else {
    document.getElementById('btnAtk2').style.display='none';
  }
}

function setupMobileBtn(id,k){
  const el=document.getElementById(id); if(!el) return;
  const press=e=>{e.preventDefault();keys[k]=true;if(k==='jump'||k==='atk1'||k==='atk2')just[k]=true;el.classList.add('pressed');};
  const rel=e=>{e.preventDefault();keys[k]=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',press,{passive:false});
  el.addEventListener('touchend',rel,{passive:false});
  el.addEventListener('touchcancel',rel,{passive:false});
  el.addEventListener('mousedown',press);
  el.addEventListener('mouseup',rel);
  el.addEventListener('mouseleave',rel);
}

function showControls(show){
  document.getElementById('controls').style.display=show?'block':'none';
}

// ── 게임 루프 ─────────────────────────────────────────────────
function gameLoop(ts){
  if(!gameRunning) return;
  const dt=Math.min((ts-lastTime)/1000,.05); lastTime=ts;
  update(dt); render();
  just.jump=false; just.atk1=false; just.atk2=false;
  animFrame=requestAnimationFrame(gameLoop);
}

function update(dt){
  updatePlayer(dt);
  if(gamePhase==='fight') updateEnemies(dt);
  updateProjectiles(dt); updateParticles(dt);
  checkDoors(); checkWin(); updateCamera(); updateHudHp();
}

// ── 플레이어 업데이트 ─────────────────────────────────────────
function updatePlayer(dt){
  if(!player) return;
  if(keys.left){player.vx=-MOVE_SPD;player.facing=-1;}
  else if(keys.right){player.vx=MOVE_SPD;player.facing=1;}
  else player.vx*=0.7;
  if(just.jump&&player.onGround){player.vy=JUMP_VEL;player.onGround=false;spawnPtcl(player.x+player.w/2,player.y+player.h,'#aaa',5,'dust');}
  player.vy=Math.min(player.vy+GRAVITY*dt,900);
  player.x+=player.vx*dt; player.y+=player.vy*dt;
  player.animTick+=dt;
  // 플랫폼 충돌
  player.onGround=false;
  // 바닥
  if(player.y+player.h>=floorY){player.y=floorY-player.h;player.vy=0;player.onGround=true;}
  // 플랫폼 (아래서 위로 통과 가능)
  for(const p of platforms){
    if(player.vx>=0||true){ // 항상 체크
      if(player.x+player.w>p.x&&player.x<p.x+p.w){
        if(player.y+player.h>p.y&&player.y+player.h<p.y+p.h+player.vy*dt+12&&player.vy>=0){
          player.y=p.y-player.h; player.vy=0; player.onGround=true;
        }
      }
    }
  }
  // 맵 경계
  player.x=Math.max(0,Math.min(mapWidth-player.w,player.x));
  // 공격
  if(player.atkCooldown[0]>0) player.atkCooldown[0]-=dt;
  if(player.atkCooldown[1]>0) player.atkCooldown[1]-=dt;
  if(just.atk1&&player.atkCooldown[0]<=0){fireAtk(0);player.atkCooldown[0]=0.38;}
  if(just.atk2&&player.atkCooldown[1]<=0&&playerData.types.length>=2){fireAtk(1);player.atkCooldown[1]=0.38;}
  // 무적
  if(player.invincible>0) player.invincible-=dt;
  // 적 접촉 데미지
  if(gamePhase==='fight'&&player.invincible<=0){
    for(const e of enemies){
      if(overlap(player,e)){
        const d=Math.max(1,Math.floor(calcStat(e.baseAtk,playerData.level)*.12));
        dmgPlayer(d); player.invincible=1.0; break;
      }
    }
  }
}

function fireAtk(ti){
  const type=playerData.types[ti]||'노말';
  const cfg=TYPE_ATTACKS[type]||TYPE_ATTACKS['노말'];
  const dmg=Math.max(1,Math.floor(playerData.atk*cfg.dmgMul*(0.85+Math.random()*.3)));
  if(cfg.melee){
    const hb={x:player.x+(player.facing>0?player.w:-cfg.range),y:player.y+4,w:cfg.range,h:player.h-8};
    for(const e of enemies) if(overlap(hb,e)) dmgEnemy(e,dmg,type);
    spawnPtcl(player.x+player.w/2+player.facing*45,player.y+player.h/2,cfg.color,10,'burst');
    return;
  }
  projectiles.push({x:player.x+(player.facing>0?player.w:0),y:player.y+player.h*.4,
    vx:cfg.speed*player.facing*65,vy:-30,size:cfg.size,
    color:cfg.color,glow:cfg.glow,type,dmg,fromPlayer:true,life:1.6,age:0,trail:[]});
}

// ── 적 업데이트 ───────────────────────────────────────────────
function updateEnemies(dt){
  for(const e of enemies){
    e.vy=Math.min(e.vy+GRAVITY*dt,900); e.x+=e.vx*dt; e.y+=e.vy*dt; e.animTick+=dt;
    e.onGround=false;
    if(e.y+e.h>=floorY){e.y=floorY-e.h; e.vy=0; e.onGround=true;}
    for(const p of platforms){
      if(e.x+e.w>p.x&&e.x<p.x+p.w){
        if(e.y+e.h>p.y&&e.y+e.h<p.y+p.h+16&&e.vy>=0){e.y=p.y-e.h;e.vy=0;e.onGround=true;}
      }
    }
    e.x=Math.max(0,Math.min(mapWidth-e.w,e.x));
    if(!player) continue;
    const dx=player.x-e.x; e.facing=dx>0?1:-1;
    const dist=Math.abs(dx); const rng=e.isBoss?200:140;
    e.aiTimer-=dt;
    if(e.aiTimer<=0){
      e.aiTimer=.4+Math.random()*.5;
      const sp=50+e.baseAtk*.15;
      e.vx=dist>rng?e.facing*(e.isBoss?sp*1.3:sp):e.vx*.5;
    }
    e.jumpTimer-=dt;
    if(e.jumpTimer<=0&&e.onGround&&dist<400&&Math.random()<.35){
      e.vy=JUMP_VEL*.78; e.onGround=false; e.jumpTimer=1.8+Math.random()*2;
    }
    e.atkCooldown-=dt;
    if(e.atkCooldown<=0&&dist<rng){
      e.atkCooldown=e.isBoss?1.0:1.6;
      const at=e.types[Math.floor(Math.random()*e.types.length)];
      const cfg=TYPE_ATTACKS[at]||TYPE_ATTACKS['노말'];
      const ed=Math.max(1,Math.floor(calcStat(e.baseAtk,Math.ceil(playerData.level*.5))*cfg.dmgMul*.32));
      projectiles.push({x:e.x+(e.facing>0?e.w:0),y:e.y+e.h*.4,
        vx:cfg.speed*e.facing*65*.75,vy:-20,size:cfg.size*.85,
        color:cfg.color,glow:cfg.glow,type:at,dmg:ed,fromPlayer:false,life:1.6,age:0,trail:[]});
    }
  }
}

// ── 투사체 ────────────────────────────────────────────────────
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    if(p.trail) p.trail.push({x:p.x,y:p.y});
    if(p.trail&&p.trail.length>5) p.trail.shift();
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=GRAVITY*dt*.06; p.age+=dt;
    let hit=false;
    if(p.fromPlayer){
      for(const e of enemies) if(ptInRect(p.x,p.y,e)){dmgEnemy(e,p.dmg,p.type);spawnPtcl(p.x,p.y,p.color,6,'burst');hit=true;break;}
    } else {
      if(player&&player.invincible<=0&&ptInRect(p.x,p.y,player)){dmgPlayer(p.dmg);player.invincible=.4;spawnPtcl(p.x,p.y,p.color,6,'burst');hit=true;}
    }
    if(hit||p.age>p.life||p.x<camera.x-50||p.x>camera.x+canvas.width+50||p.y>floorY+50) projectiles.splice(i,1);
  }
}

// ── 파티클 ────────────────────────────────────────────────────
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=p.type==='dust'?GRAVITY*dt*.15:GRAVITY*dt*.25;
    p.life-=dt; if(p.life<=0) particles.splice(i,1);
  }
}

function spawnPtcl(x,y,color,cnt,type='burst'){
  for(let i=0;i<cnt;i++){
    const a=(Math.PI*2*i/cnt)+Math.random()*.6;
    const sp=type==='dust'?30+Math.random()*60:60+Math.random()*130;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(type==='dust'?10:50),color,size:2+Math.random()*4,life:.25+Math.random()*.45,type});
  }
}

// ── 데미지 ────────────────────────────────────────────────────
function dmgPlayer(d){
  if(!player) return;
  player.hp=Math.max(0,player.hp-d); playerData.hp=player.hp;
  spawnPtcl(player.x+player.w/2,player.y+player.h/2,'#ff4757',6);
  updateHudHp(); if(player.hp<=0) endGame(false);
}

function dmgEnemy(e,d,type){
  e.hp=Math.max(0,e.hp-d);
  spawnPtcl(e.x+e.w/2,e.y+e.h/2,TYPE_ATTACKS[type]?.color||'#fff',5);
  if(e.isBoss) updateBossHud(e);
  if(e.hp<=0){spawnPtcl(e.x+e.w/2,e.y+e.h/2,'#ffcb05',18,'burst');enemies=enemies.filter(en=>en!==e);}
}

// ── 문 체크 ───────────────────────────────────────────────────
function checkDoors(){
  if(!player) return;
  for(const door of doors){
    if(!overlap(player,door)) continue;
    if(door.type==='entrance'&&gamePhase==='lobby'){
      // 입구로 들어가면 1스테이지 시작
      transitionToStage(1);
    } else if(door.type==='exit'&&gamePhase==='clear'&&!door.locked){
      stageClearTransition();
    } else if(door.type==='exit'&&door.locked&&gamePhase==='fight'){
      setHint('⚠️ 적을 모두 쓰러뜨려야 출구가 열립니다!');
      setTimeout(()=>setHint(''),2000);
    }
  }
}

let transitioning=false;
function transitionToStage(stage){
  if(transitioning) return; transitioning=true;
  gameRunning=false; cancelAnimationFrame(animFrame);
  setHint('');
  // 페이드 효과
  fadeOut(()=>{
    transitioning=false;
    launchStage(stage);
    fadeIn();
  });
}

function stageClearTransition(){
  if(transitioning) return; transitioning=true;
  gameRunning=false; cancelAnimationFrame(animFrame);
  setHint('');
  if(currentStage>=20){endGame(true);transitioning=false;return;}
  const prev={...playerData};
  const nextStageNum=currentStage+1;
  playerLevel=nextStageNum;
  const nd=buildPlayerData(selectedPokemon,playerLevel);
  const ratio=player?(player.hp/player.maxHp):1;
  nd.hp=Math.max(1,Math.floor(nd.maxHp*ratio));
  playerData=nd;
  // 레벨업 화면 표시
  document.getElementById('hud').style.display='none';
  showControls(false);
  showScreen('levelupScreen');
  document.getElementById('lvupText').textContent=`${playerData.name} Lv.${playerData.level}`;
  document.getElementById('statChanges').innerHTML=`
    <div class="stat-row"><div class="label">최대 HP</div><div class="val">${prev.maxHp}→${nd.maxHp}</div></div>
    <div class="stat-row"><div class="label">공격력</div><div class="val">${prev.atk}→${nd.atk}</div></div>
    <div class="stat-row"><div class="label">방어력</div><div class="val">${prev.def}→${nd.def}</div></div>
    <div class="stat-row"><div class="label">스피드</div><div class="val">${prev.spe}→${nd.spe}</div></div>`;
  transitioning=false;
}

function nextStage(){
  showScreen('gameScreen');
  document.getElementById('hud').style.display='block';
  showControls(true);
  launchStage(currentStage);
}

// ── 승리 체크 ─────────────────────────────────────────────────
function checkWin(){
  if(gamePhase!=='fight') return;
  if(enemies.length===0&&stageEnemyCount>0){
    gamePhase='clear';
    // 출구 잠금 해제
    const exitDoor=doors.find(d=>d.type==='exit');
    if(exitDoor) exitDoor.locked=false;
    spawnPtcl(player.x+player.w/2,player.y,'#ffcb05',20,'burst');
    setHint('✨ 클리어! 출구로 이동하세요! →');
    // 출구 방향 화살표 힌트 (3초 후 사라짐)
    setTimeout(()=>setHint(''),5000);
  }
}

// ── 카메라 ────────────────────────────────────────────────────
function updateCamera(){
  if(!player) return;
  const tx=player.x-canvas.width/3;
  camera.x+=(Math.max(0,Math.min(mapWidth-canvas.width,tx))-camera.x)*0.12;
}

// ── HUD ───────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hudName').textContent=playerData.name;
  document.getElementById('hudStage').textContent=currentStage===0?'LOBBY':`STAGE ${currentStage}/20`;
  document.getElementById('hudLv').textContent=`Lv.${playerData.level}`;
  updateHudHp();
}

function updateHudHp(){
  if(!player) return;
  const pct=player.hp/player.maxHp*100;
  const fill=document.getElementById('hudHpFill');
  fill.style.width=pct+'%';
  fill.style.background=pct>50?'#2ed573':pct>25?'#ffa502':'#ff4757';
  document.getElementById('hudHpText').textContent=`${player.hp}/${player.maxHp}`;
}

function updateBossHud(boss){
  document.getElementById('hudBossHpFill').style.width=(boss.hp/boss.maxHp*100)+'%';
}

// ── 렌더 ─────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const theme=getTheme(currentStage);

  // 하늘 — 테마별 색상
  const skyG=ctx.createLinearGradient(0,0,0,floorY);
  if(currentStage===0){
    skyG.addColorStop(0,'#1a3a2a'); skyG.addColorStop(0.5,'#2a5a3a'); skyG.addColorStop(1,'#3a6a4a');
  } else {
    const [s0,s1]=theme.sky;
    skyG.addColorStop(0,s0); skyG.addColorStop(0.55,s1);
    skyG.addColorStop(1,adjustColor(s1,20));
  }
  ctx.fillStyle=skyG; ctx.fillRect(0,0,canvas.width,canvas.height);

  // 배경 구름/장식
  renderBgDecos(theme);

  ctx.save(); ctx.translate(-camera.x,0);

  // 바닥 — 테마별
  renderFloor(theme);

  // 배경 나무/꽃 (바닥 뒤 레이어)
  renderWorldBgDecos(theme);

  // 플랫폼
  for(const p of platforms) renderPlatform(p,theme);

  // 문
  for(const d of doors) renderDoor(d);

  // 파티클
  for(const p of particles){
    const a=Math.min(1,p.life/.5);
    ctx.globalAlpha=a; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // 투사체
  for(const p of projectiles) renderProj(p);

  // 적
  for(const e of enemies) renderEnemy(e);

  // 플레이어
  renderPlayer();

  ctx.restore();

  // 로비: 안내 오버레이
  if(currentStage===0) renderLobbyOverlay();
}

// 밝기 조정 헬퍼
function adjustColor(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const clamp=v=>Math.max(0,Math.min(255,v+amt));
  return `#${clamp(r).toString(16).padStart(2,'0')}${clamp(g).toString(16).padStart(2,'0')}${clamp(b).toString(16).padStart(2,'0')}`;
}

// 테마별 바닥 렌더
function renderFloor(theme){
  const FLOOR_THEMES={
    '로비': {dirt:['#3a6a1a','#2a4a10'],grass:'#5aad2a',grassLight:'#6ec832',flowers:true},
    '숲':   {dirt:['#3a5a1a','#2a4010'],grass:'#4a8a18',grassLight:'#5aaa22',flowers:true},
    '동굴': {dirt:['#2a2a2a','#1a1a1a'],grass:'#3a3a3a',grassLight:'#4a4a4a',flowers:false,rock:true},
    '해저': {dirt:['#0a2a3a','#051a28'],grass:'#0d4a5a',grassLight:'#1a6a7a',flowers:false,water:true},
    '사막': {dirt:['#5a3a10','#3a2508'],grass:'#8a5a20',grassLight:'#a06a28',flowers:false,sand:true},
    '유적': {dirt:['#3a3a2a','#2a2a1a'],grass:'#5a5a3a',grassLight:'#6a6a4a',flowers:false,stone:true},
    '화산': {dirt:['#3a0a0a','#1a0505'],grass:'#5a1a0a',grassLight:'#7a2a10',flowers:false,lava:true},
    '설산': {dirt:['#2a3a4a','#1a2a3a'],grass:'#8ab0d0',grassLight:'#aad0f0',flowers:false,snow:true},
    '유령숲':{dirt:['#1a0a2a','#0d0515'],grass:'#3a1a5a',grassLight:'#4a2a6a',flowers:false,ghost:true},
    '우주': {dirt:['#050510','#020208'],grass:'#1a1a3a',grassLight:'#2a2a4a',flowers:false,space:true},
    '최후의 성':{dirt:['#2a0505','#150303'],grass:'#4a0a0a',grassLight:'#6a1010',flowers:false,evil:true},
  };
  const ft=FLOOR_THEMES[theme.name]||FLOOR_THEMES['숲'];

  // 흙층
  const dirtG=ctx.createLinearGradient(0,floorY+18,0,canvas.height);
  dirtG.addColorStop(0,ft.dirt[0]); dirtG.addColorStop(1,ft.dirt[1]);
  ctx.fillStyle=dirtG; ctx.fillRect(0,floorY+18,mapWidth,canvas.height-floorY);

  // 표면층
  const surfG=ctx.createLinearGradient(0,floorY-4,0,floorY+22);
  surfG.addColorStop(0,ft.grass); surfG.addColorStop(1,ft.dirt[0]);
  ctx.fillStyle=surfG; ctx.fillRect(0,floorY-4,mapWidth,26);

  // 표면 디테일
  if(ft.snow){
    // 눈 질감
    ctx.fillStyle='rgba(220,240,255,0.6)';
    for(let gx=0;gx<mapWidth;gx+=12){
      const h=3+((gx*29)%6);
      ctx.beginPath(); ctx.moveTo(gx,floorY-4); ctx.lineTo(gx+5,floorY-4-h); ctx.lineTo(gx+11,floorY-4); ctx.fill();
    }
  } else if(ft.lava){
    // 용암 균열
    const t=Date.now()/500;
    ctx.strokeStyle=`rgba(255,${80+40*Math.sin(t)},0,0.7)`; ctx.lineWidth=2;
    for(let cx=50;cx<mapWidth;cx+=200+((cx*11)%100)){
      ctx.beginPath(); ctx.moveTo(cx,floorY-4);
      ctx.bezierCurveTo(cx+30,floorY+8,cx+50,floorY+5,cx+90,floorY-4); ctx.stroke();
    }
  } else if(ft.water){
    // 물결
    const t=Date.now()/800;
    ctx.strokeStyle='rgba(100,200,255,0.4)'; ctx.lineWidth=2;
    for(let wx=0;wx<mapWidth;wx+=80){
      ctx.beginPath();
      ctx.moveTo(wx,floorY-2);
      ctx.quadraticCurveTo(wx+20,floorY-8+3*Math.sin(t+wx/80),wx+40,floorY-2);
      ctx.stroke();
    }
  } else if(ft.rock||ft.stone){
    // 바위 표면 무늬
    ctx.fillStyle='rgba(0,0,0,0.2)';
    for(let rx=20;rx<mapWidth;rx+=90+((rx*17)%40)){
      ctx.fillRect(rx,floorY-2,40+((rx*7)%30),3);
    }
  } else if(ft.flowers){
    // 풀 날
    ctx.fillStyle=ft.grassLight;
    for(let gx=0;gx<mapWidth;gx+=9){
      const h=4+((gx*37+42)%7);
      ctx.beginPath(); ctx.moveTo(gx,floorY-4); ctx.lineTo(gx+4,floorY-4-h); ctx.lineTo(gx+8,floorY-4); ctx.fill();
    }
  }

  // 바닥 무늬
  ctx.fillStyle='rgba(0,0,0,.1)';
  for(let rx=20;rx<mapWidth;rx+=120+((rx*13)%60)){
    ctx.beginPath(); ctx.ellipse(rx,floorY+10,18+((rx*7)%14),6,0,0,Math.PI*2); ctx.fill();
  }
}

function renderBgDecos(theme){
  const t=Date.now()/1000;
  ctx.save();
  // 어두운 테마: 별
  const darkThemes=['동굴','유적','고스트','유령숲','우주','최후의 성'];
  const isDark=darkThemes.includes(theme.name)||currentStage===0||currentStage>=15;
  if(isDark){
    for(let i=0;i<50;i++){
      const sx=((i*137+50)%1000)/1000*canvas.width;
      const sy=((i*89+20)%1000)/1000*(canvas.height*.7);
      ctx.fillStyle=`rgba(255,255,255,${.1+.3*Math.sin(t+i)})`;
      ctx.fillRect(sx,sy,1.5+(i%3===0?1:0),1.5+(i%3===0?1:0));
    }
  }
  // 밝은 테마: 구름
  const brightThemes=['숲','로비','설산'];
  if(brightThemes.includes(theme.name)||currentStage<=4){
    ctx.globalAlpha=.65;
    const clouds=[
      {x:canvas.width*.1,y:canvas.height*.12,s:1.0},
      {x:canvas.width*.38,y:canvas.height*.08,s:0.75},
      {x:canvas.width*.65,y:canvas.height*.14,s:1.2},
      {x:canvas.width*.82,y:canvas.height*.06,s:0.6},
    ];
    for(const cl of clouds){
      const ox=((t*12)%canvas.width);
      const cx=(cl.x-ox*0.04+canvas.width)%canvas.width;
      // 설산은 흰 구름, 어두운 테마는 회색 구름
      const cloudColor=theme.name==='설산'?'rgba(200,220,255,.9)':'rgba(255,255,255,.82)';
      drawCloud(cx,cl.y,cl.s,cloudColor);
    }
    ctx.globalAlpha=1;
  }
  // 화산: 불씨 파티클 효과 (배경)
  if(theme.name==='화산'){
    for(let i=0;i<8;i++){
      const fx=((i*271+t*30)%canvas.width);
      const fy=canvas.height*.4+Math.sin(t*2+i)*(canvas.height*.2);
      ctx.fillStyle=`rgba(255,${80+i*10},0,${.1+.1*Math.sin(t+i)})`;
      ctx.beginPath(); ctx.arc(fx,fy,2+i%3,0,Math.PI*2); ctx.fill();
    }
  }
  // 해저: 기포
  if(theme.name==='해저'){
    for(let i=0;i<10;i++){
      const bx=((i*193+t*15)%canvas.width);
      const by=canvas.height-((t*25+i*50)%(canvas.height));
      ctx.fillStyle=`rgba(100,200,255,${.1+.08*Math.sin(t+i)})`;
      ctx.beginPath(); ctx.arc(bx,by,2+i%4,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

function drawCloud(cx,cy,scale,color='rgba(255,255,255,.82)'){
  ctx.fillStyle=color;
  const r=22*scale;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*.8,cy+r*.2,r*.7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx-r*.8,cy+r*.2,r*.65,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*.4,cy-r*.3,r*.55,0,Math.PI*2); ctx.fill();
}

// 월드 배경 (카메라 이동 후 좌표계에서 그리는 원거리 오브젝트)
function renderWorldBgDecos(theme){
  const t=Date.now()/1000;
  const tn=theme?theme.name:'숲';

  if(tn==='숲'||tn==='로비'){
    // 나무
    const treePositions=[80,280,520,760,1020,1300,1580,1860,2100];
    for(const tx of treePositions) drawTree(tx, floorY-4, '#2e8b1a','#3aad22');
    // 꽃밭
    for(let fx=60;fx<mapWidth;fx+=38+((fx*11)%30)){
      const fc=((fx*17)%3)===0?'#fff176':((fx*17)%3)===1?'#ff8fb1':'#aed6f1';
      ctx.fillStyle=fc; ctx.globalAlpha=.8;
      ctx.beginPath(); ctx.arc(fx,floorY-6,3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  } else if(tn==='동굴'){
    // 종유석
    ctx.fillStyle='#4a3a2a';
    for(let sx=100;sx<mapWidth;sx+=150+((sx*13)%80)){
      const h=30+((sx*7)%40);
      ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx-8,h); ctx.lineTo(sx+8,h); ctx.closePath(); ctx.fill();
    }
    // 석순
    ctx.fillStyle='#5a4a3a';
    for(let sx=180;sx<mapWidth;sx+=120+((sx*11)%70)){
      const h=15+((sx*9)%25);
      ctx.beginPath(); ctx.moveTo(sx,floorY); ctx.lineTo(sx-5,floorY-h); ctx.lineTo(sx+5,floorY-h); ctx.closePath(); ctx.fill();
    }
  } else if(tn==='화산'){
    // 용암 웅덩이
    const lavaT=t*0.5;
    ctx.fillStyle='rgba(255,60,0,0.15)';
    for(let lx=100;lx<mapWidth;lx+=300+((lx*7)%100)){
      ctx.beginPath(); ctx.ellipse(lx,floorY-2,60,8,0,0,Math.PI*2); ctx.fill();
    }
    // 화산 바위
    ctx.fillStyle='#2a0a0a';
    for(let rx=200;rx<mapWidth;rx+=400+((rx*13)%150)){
      ctx.beginPath(); ctx.arc(rx,floorY-20,25,0,Math.PI*2); ctx.fill();
    }
  } else if(tn==='설산'){
    // 눈 쌓인 소나무
    const treePositions=[100,320,600,900,1200,1500,1800];
    for(const tx of treePositions) drawTree(tx,floorY-4,'#2a4a2a','#1a3a1a');
    // 눈 쌓임
    ctx.fillStyle='rgba(220,240,255,0.5)';
    for(let tx of treePositions){
      ctx.beginPath(); ctx.arc(tx,floorY-95,20,0,Math.PI*2); ctx.fill();
    }
  } else if(tn==='해저'){
    // 산호초
    for(let cx=150;cx<mapWidth;cx+=200+((cx*11)%80)){
      ctx.fillStyle=((cx*7)%2===0)?'#ff6b9d':'#ff9f40';
      ctx.globalAlpha=0.6;
      ctx.beginPath(); ctx.arc(cx,floorY-8,12,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-10,floorY-18,8,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+10,floorY-16,9,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
    // 해초
    ctx.strokeStyle='rgba(0,200,100,0.4)'; ctx.lineWidth=3;
    for(let sx=80;sx<mapWidth;sx+=120+((sx*13)%60)){
      const waveAmp=8*Math.sin(t*1.5+sx/100);
      ctx.beginPath();
      ctx.moveTo(sx,floorY);
      ctx.quadraticCurveTo(sx+waveAmp,floorY-25,sx+waveAmp*0.5,floorY-50);
      ctx.stroke();
    }
  } else if(tn==='유령숲'){
    // 앙상한 나무
    const treePositions=[80,260,500,740,980,1260,1540,1800];
    for(const tx of treePositions) drawDeadTree(tx, floorY-4);
  } else if(tn==='우주'){
    // 행성/별 (배경)
    ctx.globalAlpha=0.2;
    ctx.fillStyle='#8040ff';
    ctx.beginPath(); ctx.arc(400,floorY-180,40,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0088ff';
    ctx.beginPath(); ctx.arc(1200,floorY-120,30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.arc(800,floorY-200,20,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  } else if(tn==='사막'){
    // 선인장
    for(let cx=200;cx<mapWidth;cx+=300+((cx*11)%120)){
      ctx.fillStyle='#3a6a1a';
      ctx.fillRect(cx-4,floorY-60,8,60);  // 몸통
      ctx.fillRect(cx-18,floorY-45,14,8); // 왼팔
      ctx.fillRect(cx+4,floorY-38,14,8);  // 오른팔
    }
  } else if(tn==='유적'){
    // 부서진 돌기둥
    for(let px=200;px<mapWidth;px+=380+((px*13)%100)){
      ctx.fillStyle='#5a5a4a';
      ctx.fillRect(px-10,floorY-70,20,70);
      ctx.fillStyle='#4a4a3a';
      for(let by2=floorY-68;by2<floorY;by2+=18){
        ctx.strokeStyle='#3a3a2a'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px-10,by2); ctx.lineTo(px+10,by2); ctx.stroke();
      }
    }
  } else if(tn==='최후의 성'){
    // 어두운 뾰족 첨탑
    for(let px=250;px<mapWidth;px+=450+((px*13)%100)){
      ctx.fillStyle='#1a0505';
      ctx.beginPath();
      ctx.moveTo(px,floorY-100);
      ctx.lineTo(px-15,floorY);
      ctx.lineTo(px+15,floorY);
      ctx.closePath(); ctx.fill();
      // 빨간 창문
      ctx.fillStyle='rgba(200,30,0,0.5)';
      ctx.beginPath(); ctx.arc(px,floorY-55,5,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawTree(x,groundY,leafColor='#2e8b1a',leafColor2='#3aad22'){
  ctx.fillStyle='#6b3a1f';
  ctx.fillRect(x-5,groundY-55,10,55);
  ctx.fillStyle=leafColor;
  ctx.beginPath(); ctx.arc(x,groundY-70,26,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=leafColor2;
  ctx.beginPath(); ctx.arc(x-8,groundY-85,20,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+8,groundY-82,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4dc42e';
  ctx.beginPath(); ctx.arc(x,groundY-95,18,0,Math.PI*2); ctx.fill();
}

function drawDeadTree(x,groundY){
  ctx.strokeStyle='#3a2a4a'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(x,groundY); ctx.lineTo(x,groundY-80); ctx.stroke();
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,groundY-50); ctx.lineTo(x-30,groundY-70); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,groundY-60); ctx.lineTo(x+25,groundY-80); ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x-30,groundY-70); ctx.lineTo(x-45,groundY-80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,groundY-80); ctx.lineTo(x-10,groundY-95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,groundY-80); ctx.lineTo(x+10,groundY-92); ctx.stroke();
}

function renderPlatform(p,theme){
  const tn=theme?theme.name:'숲';
  // 테마별 플랫폼 팔레트
  const PAL={
    '로비': {top:'#5aad2a',topL:'#6ec832',body:'#7a4f28',bodyD:'#5a3010',flower:true},
    '숲':   {top:'#4a9a20',topL:'#5aba28',body:'#6a4020',bodyD:'#4a2810',flower:true},
    '동굴': {top:'#5a5040',topL:'#6a6050',body:'#4a4030',bodyD:'#3a3020',flower:false,rock:true},
    '해저': {top:'#0a6a7a',topL:'#1a8a9a',body:'#0a3a4a',bodyD:'#052830',flower:false},
    '사막': {top:'#8a7020',topL:'#aa9030',body:'#6a5010',bodyD:'#4a3808',flower:false},
    '유적': {top:'#6a6040',topL:'#7a7050',body:'#5a5030',bodyD:'#3a3820',flower:false},
    '화산': {top:'#5a1a0a',topL:'#7a2a10',body:'#3a0a05',bodyD:'#200503',flower:false,lava:true},
    '설산': {top:'#8ab0d8',topL:'#aad0f8',body:'#4a6888',bodyD:'#2a4858',flower:false,snow:true},
    '유령숲':{top:'#3a1a5a',topL:'#4a2a6a',body:'#2a0a3a',bodyD:'#180525',flower:false},
    '우주': {top:'#2a2a5a',topL:'#3a3a6a',body:'#1a1a3a',bodyD:'#0d0d20',flower:false},
    '최후의 성':{top:'#4a0808',topL:'#6a1010',body:'#2a0505',bodyD:'#150303',flower:false},
  };
  const pal=PAL[tn]||PAL['숲'];

  // 몸통
  const dg=ctx.createLinearGradient(0,p.y+8,0,p.y+p.h);
  dg.addColorStop(0,pal.body); dg.addColorStop(1,pal.bodyD);
  ctx.fillStyle=dg;
  ctx.beginPath(); ctx.roundRect(p.x,p.y+8,p.w,p.h-8,4); ctx.fill();

  // 무늬
  ctx.fillStyle='rgba(0,0,0,.15)';
  for(let rx=p.x+12;rx<p.x+p.w-10;rx+=24+((rx*7)%12)){
    ctx.beginPath(); ctx.ellipse(rx,p.y+p.h-6,6,3,0,0,Math.PI*2); ctx.fill();
  }

  // 윗면
  const gg=ctx.createLinearGradient(0,p.y,0,p.y+12);
  gg.addColorStop(0,pal.topL); gg.addColorStop(1,pal.top);
  ctx.fillStyle=gg;
  ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,12,[4,4,0,0]); ctx.fill();

  if(pal.snow){
    // 눈 쌓임
    ctx.fillStyle='rgba(220,240,255,0.7)';
    for(let gx=p.x+4;gx<p.x+p.w-4;gx+=10){
      const h=3+((gx*19)%5);
      ctx.beginPath(); ctx.moveTo(gx,p.y); ctx.lineTo(gx+4,p.y-h); ctx.lineTo(gx+9,p.y); ctx.fill();
    }
  } else if(pal.lava){
    // 용암 균열
    const t=Date.now()/600;
    ctx.strokeStyle=`rgba(255,${100+50*Math.sin(t+p.x/100)},0,0.5)`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(p.x+p.w*.2,p.y+6); ctx.lineTo(p.x+p.w*.5,p.y+10); ctx.lineTo(p.x+p.w*.8,p.y+6); ctx.stroke();
  } else if(pal.flower){
    // 풀 날
    ctx.fillStyle=pal.topL;
    for(let gx=p.x+4;gx<p.x+p.w-4;gx+=8){
      const h=3+((gx*31)%5);
      ctx.beginPath(); ctx.moveTo(gx,p.y); ctx.lineTo(gx+3,p.y-h); ctx.lineTo(gx+6,p.y); ctx.fill();
    }
    // 꽃
    if(((p.x*3+p.y)%5)===0){
      const fx=p.x+p.w*0.25;
      ctx.fillStyle='#fff176'; ctx.beginPath(); ctx.arc(fx,p.y-6,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffcc02'; ctx.beginPath(); ctx.arc(fx,p.y-6,1.5,0,Math.PI*2); ctx.fill();
    }
    if(((p.x*7+p.y)%4)===0){
      const fx=p.x+p.w*0.7;
      ctx.fillStyle='#ff8fb1'; ctx.beginPath(); ctx.arc(fx,p.y-5,2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(fx,p.y-5,1,0,Math.PI*2); ctx.fill();
    }
  }
}

function renderDoor(d){
  const t=Date.now()/1000;
  const cx=d.x+d.w/2;

  if(d.type==='entrance'){
    // ── 입구: 돌 아치 ──────────────────────────────────────────
    const w=d.w, h=d.h, bx=d.x, by=d.y;
    const archR=w/2;

    ctx.fillStyle='#5a4a3a';
    ctx.fillRect(bx-6, by+h*0.7, w+12, h*0.3+4);

    drawStonePillar(bx-8, by+archR, 18, h-archR);
    drawStonePillar(bx+w-10, by+archR, 18, h-archR);

    ctx.fillStyle='#1a0f08';
    ctx.beginPath();
    ctx.arc(cx, by+archR, archR-2, Math.PI, 0);
    ctx.rect(bx+2, by+archR, w-4, h-archR-2);
    ctx.fill();

    const archStones=14;
    for(let i=0;i<=archStones;i++){
      const angle=Math.PI-(Math.PI*i/archStones);
      const r1=archR, r2=archR+14;
      const ax1=cx+Math.cos(angle)*r1, ay1=by+archR+Math.sin(angle)*r1;
      const ax2=cx+Math.cos(angle)*r2, ay2=by+archR+Math.sin(angle)*r2;
      const angle2=Math.PI-(Math.PI*(i+1)/archStones);
      const bx1=cx+Math.cos(angle2)*r1, by1=by+archR+Math.sin(angle2)*r1;
      const bx2=cx+Math.cos(angle2)*r2, by2=by+archR+Math.sin(angle2)*r2;
      ctx.fillStyle=i%2===0?'#8a7060':'#7a6050';
      ctx.beginPath();
      ctx.moveTo(ax1,ay1); ctx.lineTo(ax2,ay2); ctx.lineTo(bx2,by2); ctx.lineTo(bx1,by1);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#4a3828'; ctx.lineWidth=1; ctx.stroke();
    }

    ctx.fillStyle='#9a8070';
    ctx.beginPath(); ctx.arc(cx, by+archR-archR-10, 12, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#5a4030'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.strokeStyle='#c8a878'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx,by+archR-archR-18); ctx.lineTo(cx,by+archR-archR-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-7,by+archR-archR-10); ctx.lineTo(cx+7,by+archR-archR-10); ctx.stroke();

    const glowA=0.3+0.2*Math.sin(t*2);
    const glowG=ctx.createRadialGradient(cx,by+h*0.6,0,cx,by+h*0.6,archR*0.8);
    glowG.addColorStop(0,`rgba(100,200,255,${glowA})`);
    glowG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glowG;
    ctx.beginPath();
    ctx.arc(cx,by+archR,archR-2,Math.PI,0);
    ctx.rect(bx+2,by+archR,w-4,h-archR-2);
    ctx.fill();

    ctx.save();
    ctx.globalAlpha=0.7+0.2*Math.sin(t*1.5);
    ctx.fillStyle='#ffe082';
    ctx.font="bold 11px 'Galmuri11',monospace";
    ctx.textAlign='center';
    ctx.fillText('입구',cx,by+h*0.72);
    ctx.restore();

  } else {
    // ── 출구 ────────────────────────────────────────────────────
    const w=d.w, h=d.h, bx=d.x, by=d.y;
    const archR=w/2;
    const isLocked=d.locked;

    // 기초
    ctx.fillStyle=isLocked?'#2a2a2a':'#4a3a18';
    ctx.fillRect(bx-4, by+h*0.75, w+8, h*0.25+4);

    // 내부
    ctx.fillStyle=isLocked?'#0a0a0a':'#0d1a0d';
    ctx.beginPath();
    ctx.arc(cx, by+archR, archR-2, Math.PI, 0);
    ctx.rect(bx+2, by+archR, w-4, h-archR-2);
    ctx.fill();

    if(isLocked){
      // 잠긴 출구: 회색 기둥 + 자물쇠
      drawStonePillar(bx-6, by+archR, 16, h-archR);
      drawStonePillar(bx+w-10, by+archR, 16, h-archR);

      // 회색 아치
      ctx.strokeStyle='rgba(100,100,100,0.6)'; ctx.lineWidth=4;
      ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(cx, by+archR, archR+4, Math.PI, 0); ctx.stroke();

      // 철창
      ctx.strokeStyle='rgba(80,80,80,0.8)'; ctx.lineWidth=3;
      const barCount=4;
      for(let bi=0;bi<=barCount;bi++){
        const bxPos=bx+4+bi*(w-8)/barCount;
        ctx.beginPath(); ctx.moveTo(bxPos,by+archR); ctx.lineTo(bxPos,by+h-4); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(bx+4,by+archR+(h-archR)*0.4); ctx.lineTo(bx+w-4,by+archR+(h-archR)*0.4); ctx.stroke();

      // 자물쇠 아이콘
      const lx=cx, ly=by+archR-10;
      ctx.fillStyle='rgba(150,120,50,0.9)';
      ctx.beginPath(); ctx.roundRect(lx-10,ly,20,15,3); ctx.fill();
      ctx.strokeStyle='rgba(150,120,50,0.9)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(lx,ly,8,Math.PI,0); ctx.stroke();

      // 잠김 텍스트
      ctx.save();
      ctx.globalAlpha=0.5+0.2*Math.sin(t*1.5);
      ctx.fillStyle='#aaaaaa';
      ctx.font="bold 10px 'Galmuri11',monospace";
      ctx.textAlign='center';
      ctx.fillText('🔒 잠김',cx,by+h*0.88);
      ctx.restore();

    } else {
      // 열린 출구: 황금 아치
      drawGoldPillar(bx-6, by+archR, 16, h-archR);
      drawGoldPillar(bx+w-10, by+archR, 16, h-archR);

      ctx.strokeStyle='#ffcb05'; ctx.lineWidth=5;
      ctx.shadowColor='rgba(255,203,5,.6)'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(cx, by+archR, archR+4, Math.PI, 0); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.strokeStyle='#ffa000'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx, by+archR, archR+8, Math.PI, 0); ctx.stroke();

      const glowA=0.25+0.2*Math.sin(t*2.5);
      const glowG=ctx.createRadialGradient(cx,by+h*0.55,0,cx,by+h*0.55,archR);
      glowG.addColorStop(0,`rgba(255,220,50,${glowA})`);
      glowG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=glowG;
      ctx.beginPath();
      ctx.arc(cx,by+archR,archR-2,Math.PI,0);
      ctx.rect(bx+2,by+archR,w-4,h-archR-2);
      ctx.fill();

      // 별 반짝임
      for(let i=0;i<4;i++){
        const sa=t*3+i*Math.PI/2;
        const sx=cx+Math.cos(sa)*archR*0.5;
        const sy=by+archR*0.6+Math.sin(sa)*archR*0.3;
        const ss=1+Math.sin(t*4+i)*1;
        ctx.fillStyle=`rgba(255,230,100,${0.4+0.4*Math.sin(t*3+i)})`;
        ctx.beginPath(); ctx.arc(sx,sy,ss,0,Math.PI*2); ctx.fill();
      }

      ctx.save();
      ctx.globalAlpha=0.7+0.25*Math.sin(t*2);
      ctx.fillStyle='#ffcb05';
      ctx.shadowColor='rgba(255,200,0,.8)'; ctx.shadowBlur=6;
      ctx.font="bold 11px 'Galmuri11',monospace";
      ctx.textAlign='center';
      ctx.fillText('출구 →',cx,by+h*0.72);
      ctx.restore();
    }
  }
}

function drawStonePillar(x,y,w,h){
  // 돌 기둥
  const pg=ctx.createLinearGradient(x,0,x+w,0);
  pg.addColorStop(0,'#6a5848'); pg.addColorStop(0.4,'#8a7868'); pg.addColorStop(1,'#5a4838');
  ctx.fillStyle=pg;
  ctx.fillRect(x,y,w,h);
  // 블록 줄
  ctx.strokeStyle='#4a3828'; ctx.lineWidth=1;
  for(let by2=y+10;by2<y+h;by2+=18){
    ctx.beginPath(); ctx.moveTo(x,by2); ctx.lineTo(x+w,by2); ctx.stroke();
  }
  // 하이라이트
  ctx.fillStyle='rgba(255,255,255,.1)';
  ctx.fillRect(x+2,y,3,h);
}

function drawGoldPillar(x,y,w,h){
  const pg=ctx.createLinearGradient(x,0,x+w,0);
  pg.addColorStop(0,'#a07820'); pg.addColorStop(0.4,'#ffd740'); pg.addColorStop(1,'#a07820');
  ctx.fillStyle=pg;
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#c8960a'; ctx.lineWidth=1;
  for(let by2=y+12;by2<y+h;by2+=20){
    ctx.beginPath(); ctx.moveTo(x,by2); ctx.lineTo(x+w,by2); ctx.stroke();
  }
}

function renderPlayer(){
  if(!player) return;
  if(player.invincible>0&&Math.floor(player.invincible*12)%2===0) return;
  ctx.save();
  ctx.translate(player.x+player.w/2,player.y+player.h/2);
  if(player.facing>0) ctx.scale(-1,1);
  // 이동 애니: 땅에 있을때 약간 스쿼시
  const onG=player.onGround;
  const scaleY=onG&&Math.abs(player.vx)>20?0.92:1;
  const scaleX=onG&&Math.abs(player.vx)>20?1.06:1;
  ctx.scale(scaleX,scaleY);
  ctx.shadowColor=TYPE_ATTACKS[playerData.types[0]]?.glow||'#fff'; ctx.shadowBlur=18;
  if(player.img.complete&&player.img.naturalWidth>0)
    ctx.drawImage(player.img,-player.w/2,-player.h/2,player.w,player.h);
  else{ctx.fillStyle='#ffcb05';ctx.fillRect(-player.w/2,-player.h/2,player.w,player.h);}
  ctx.restore();

  // 플레이어 HP바 — 이미지 바로 위 고정
  const barW=player.w+16;
  const barX=player.x-8;
  const barY=player.y-22;
  const hpRatio=player.hp/player.maxHp;
  const hpColor=hpRatio>0.5?'#2ed573':hpRatio>0.25?'#ffa502':'#ff4757';

  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,8,4); ctx.fill();
  if(hpRatio>0){
    ctx.fillStyle=hpColor;
    ctx.beginPath(); ctx.roundRect(barX,barY,barW*hpRatio,8,4); ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,8,4); ctx.stroke();

  // 땅에 서있을때 그림자
  ctx.save();
  ctx.globalAlpha=.25;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(player.x+player.w/2,floorY,player.w*.5,6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function renderEnemy(e){
  ctx.save();
  ctx.translate(e.x+e.w/2,e.y+e.h/2);
  if(e.facing<0) ctx.scale(-1,1);
  if(e.isBoss){ctx.shadowColor='#ff4757';ctx.shadowBlur=22;}
  // 위아래 부유 애니 (이미지에만 적용)
  const bobY=Math.sin(e.animTick*2.2+(e.x*0.01))*5+(e.isBoss?Math.sin(e.animTick*1.3)*3:0);
  if(e.img.complete&&e.img.naturalWidth>0)
    ctx.drawImage(e.img,-e.w/2,-e.h/2+bobY,e.w,e.h);
  else{ctx.fillStyle=e.isBoss?'#ff4757':'#aaa';ctx.fillRect(-e.w/2,-e.h/2+bobY,e.w,e.h);}
  ctx.restore();

  // HP바 — 이미지 위 고정 위치 (bobY 미적용)
  const barW=e.w+12;
  const barX=e.x-6;
  const barY=e.y-20;  // 이미지 상단에서 고정
  const barH=e.isBoss?9:7;
  const hpRatio=e.hp/e.maxHp;

  // 배경
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,3); ctx.fill();

  // HP 색상 (비율에 따라)
  const hpColor=hpRatio>0.5?'#2ed573':hpRatio>0.25?'#ffa502':'#ff4757';
  ctx.fillStyle=e.isBoss?'#ff4757':hpColor;
  if(hpRatio>0){
    ctx.beginPath(); ctx.roundRect(barX,barY,barW*hpRatio,barH,3); ctx.fill();
  }

  // 테두리
  ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,3); ctx.stroke();

  // 보스: 이름 텍스트
  if(e.isBoss){
    ctx.fillStyle='#ff6b7a';
    ctx.font="bold 12px 'Galmuri11',monospace";
    ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
    ctx.fillText(e.name, e.x+e.w/2, barY-5);
    ctx.shadowBlur=0;
  }

  // 바닥 그림자
  const shadowDist=floorY-(e.y+e.h);
  const shadowScale=Math.max(0.3, 1-shadowDist/200);
  ctx.save(); ctx.globalAlpha=.2*shadowScale; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(e.x+e.w/2,floorY-2,e.w*.45*shadowScale,4*shadowScale,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function renderProj(p){
  const alpha=Math.max(0,1-p.age/p.life);
  // 트레일
  if(p.trail&&p.trail.length>1){
    for(let i=1;i<p.trail.length;i++){
      const ta=alpha*(i/p.trail.length)*.4;
      ctx.save(); ctx.globalAlpha=ta; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.trail[i].x,p.trail[i].y,p.size*(i/p.trail.length)*.7,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  ctx.save(); ctx.globalAlpha=alpha; ctx.shadowColor=p.glow; ctx.shadowBlur=14;
  ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*.35,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function renderLobbyOverlay(){
  // 포켓몬 이름/타입 표시
  const t=Date.now()/800;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(canvas.width/2-130,canvas.height*.12,260,68);
  ctx.strokeStyle='rgba(255,203,5,.3)'; ctx.lineWidth=1; ctx.strokeRect(canvas.width/2-130,canvas.height*.12,260,68);
  ctx.textAlign='center';
  ctx.fillStyle='#ffcb05'; ctx.font="14px 'Galmuri11',monospace";
  ctx.fillText('🎮 '+playerData.name, canvas.width/2, canvas.height*.12+26);
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font="11px 'Galmuri11',monospace";
  ctx.fillText('타입: '+playerData.types.join(' / '), canvas.width/2, canvas.height*.12+46);
  ctx.fillStyle=`rgba(255,255,255,${.5+.25*Math.sin(t)})`;
  ctx.fillText('→ 입구로 들어가 모험을 시작하세요!', canvas.width/2, canvas.height*.12+63);
  ctx.restore();
}

// ── 게임 종료 ────────────────────────────────────────────────
async function endGame(win){
  gameRunning=false; cancelAnimationFrame(animFrame);
  document.getElementById('hud').style.display='none';
  showControls(false); setHint('');
  document.onkeydown=null; document.onkeyup=null;
  if(win){
    showScreen('clearScreen');
    document.getElementById('clearImg').src=selectedPokemon.sprite;
    document.getElementById('clearName').textContent=selectedPokemon.name;
    document.getElementById('clearMsg').textContent='도감으로 전송 중...';
    const ok=await sendReward(selectedPokemon);
    document.getElementById('clearMsg').textContent=ok?'✅ 포켓몬 데일리 도감에 전송됐어요!':'❌ 전송 실패 (로그인 확인)';
  } else {
    showScreen('gameoverScreen');
    document.getElementById('gameoverMsg').textContent=`STAGE ${currentStage}에서 쓰러졌습니다...`;
  }
}

function backToTitle(){
  gameRunning=false; cancelAnimationFrame(animFrame);
  document.getElementById('hud').style.display='none';
  showControls(false); setHint('');
  document.onkeydown=null; document.onkeyup=null;
  showScreen('titleScreen');
}

// ── 유틸 ─────────────────────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function ptInRect(px,py,r){return px>r.x&&px<r.x+r.w&&py>r.y&&py<r.y+r.h;}

function setHint(msg){document.getElementById('stageHint').textContent=msg;}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

// 페이드 오버레이
const fadeEl=document.createElement('div');
fadeEl.style.cssText='position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:999;transition:opacity .35s';
document.body.appendChild(fadeEl);
function fadeOut(cb){fadeEl.style.pointerEvents='all';fadeEl.style.opacity='1';setTimeout(cb,380);}
function fadeIn(){setTimeout(()=>{fadeEl.style.opacity='0';fadeEl.style.pointerEvents='none';},50);}

window.addEventListener('resize',()=>{
  if(!document.getElementById('gameScreen').classList.contains('hidden')){
    resizeCanvas();
    if(player) player.y=Math.min(player.y,floorY-player.h);
  }
});

// ── 모든 버튼 이벤트 연결 (module scope 문제 해결) ───────────
document.addEventListener('DOMContentLoaded', ()=>{});
// module은 defer이므로 DOM 이미 준비됨 — 바로 연결
(()=>{
  const on=(id,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener('click',fn); };
  on('btnTitleStart',   ()=>onTitleStart());
  on('btnTitleLogout',  ()=>doLogout());
  on('tabLogin',        ()=>switchTab('login'));
  on('tabSignup',       ()=>switchTab('signup'));
  on('btnLoginAction',  ()=>doAuth());
  on('btnConfirm',      ()=>confirmSelect());
  on('btnNextStage',    ()=>nextStage());
  on('btnClearTitle',   ()=>backToTitle());
  on('btnGameoverTitle',()=>backToTitle());
  // 검색창
  const srch=document.getElementById('pkSearchInput')||document.getElementById('pkSearch');
  if(srch) srch.addEventListener('input',()=>filterPokemon());
})();
